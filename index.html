<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Insurance Claims Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header { width: 100%; max-width: 660px; margin-bottom: 28px; text-align: center; }
    header h1 { font-size: 1.7rem; color: #1a1a2e; font-weight: 700; }
    header p { margin-top: 8px; color: #555; font-size: 0.93rem; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 36px;
      width: 100%;
      max-width: 660px;
    }

    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.87rem; font-weight: 600; color: #333; margin-bottom: 5px; }

    input, select, textarea {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid #dde1e7; border-radius: 8px;
      font-size: 0.93rem; color: #222;
      background: #fafbfc; transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none; border-color: #4f46e5; background: #fff;
    }

    textarea { resize: vertical; min-height: 95px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    button {
      width: 100%; padding: 12px;
      background: #4f46e5; color: #fff;
      font-size: 0.97rem; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      margin-top: 6px; transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .loading {
      display: none; text-align: center;
      padding: 14px; color: #6b7280; font-size: 0.9rem;
    }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 3px solid #e0e0e0; border-top-color: #4f46e5;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 7px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #result {
      display: none; margin-top: 24px; padding: 22px;
      border-radius: 10px; border-left: 5px solid #4f46e5;
      background: #f5f3ff;
    }
    #result h3 { font-size: 1rem; color: #1a1a2e; margin-bottom: 12px; }

    .result-row {
      display: flex; justify-content: space-between;
      align-items: flex-start; padding: 7px 0;
      border-bottom: 1px solid #e5e7f0; font-size: 0.88rem;
    }
    .result-row:last-child { border-bottom: none; }
    .rl { color: #6b7280; font-weight: 500; flex-shrink: 0; margin-right: 10px; }
    .rv { color: #111; text-align: right; }

    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 0.78rem; font-weight: 700; }
    .badge-high   { background: #fee2e2; color: #b91c1c; }
    .badge-medium { background: #fef3c7; color: #92400e; }
    .badge-low    { background: #d1fae5; color: #065f46; }

    .doc-list { list-style: none; padding: 0; text-align: right; }
    .doc-list li { font-size: 0.85rem; color: #374151; padding: 2px 0; }
    .doc-list li::before { content: "📄 "; }

    .error-msg {
      display: none; margin-top: 14px; padding: 11px 14px;
      background: #fef2f2; border: 1px solid #fca5a5;
      border-radius: 8px; color: #b91c1c; font-size: 0.88rem;
    }
  </style>
</head>
<body>

<header>
  <h1>🛡️ Insurance Claims Portal</h1>
  <p>Submit your claim. Our AI automation triages and prioritizes it instantly.</p>
</header>

<div class="card">
  <form id="claimForm">
    <div class="row">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="full_name" placeholder="Jane Smith" required/>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="email" placeholder="jane@example.com" required/>
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label>Claim Type *</label>
        <select id="claim_type" required>
          <option value="">Select...</option>
          <option value="accident">Accident</option>
          <option value="theft">Theft</option>
          <option value="medical">Medical</option>
          <option value="property_damage">Property Damage</option>
          <option value="travel">Travel</option>
          <option value="life">Life Insurance</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Incident Date *</label>
        <input type="date" id="incident_date" required/>
      </div>
    </div>

    <div class="form-group">
      <label>Incident Description *</label>
      <textarea id="description" placeholder="Describe what happened in detail..." required></textarea>
    </div>

    <button type="submit" id="submitBtn">Submit Claim →</button>
  </form>

  <div class="loading" id="loading">
    <span class="spinner"></span>Analyzing your claim with AI...
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div id="result">
    <h3>✅ Claim Analyzed Successfully</h3>
    <div class="result-row">
      <span class="rl">Claim ID</span>
      <span class="rv" id="res-id">—</span>
    </div>
    <div class="result-row">
      <span class="rl">Priority</span>
      <span class="rv" id="res-priority">—</span>
    </div>
    <div class="result-row">
      <span class="rl">Est. Processing</span>
      <span class="rv" id="res-days">—</span>
    </div>
    <div class="result-row">
      <span class="rl">Required Documents</span>
      <ul class="doc-list" id="res-docs"></ul>
    </div>
    <div class="result-row">
      <span class="rl">Next Steps</span>
      <span class="rv" id="res-next">—</span>
    </div>
    <div class="result-row">
      <span class="rl">Summary</span>
      <span class="rv" id="res-summary">—</span>
    </div>
  </div>
</div>

<script>
 const N8N_WEBHOOK_URL = "https://tegzy05.app.n8n.cloud/webhook/claims";

  document.getElementById("claimForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const btn     = document.getElementById("submitBtn");
    const loading = document.getElementById("loading");
    const result  = document.getElementById("result");
    const errMsg  = document.getElementById("errorMsg");

    btn.disabled = true;
    loading.style.display = "block";
    result.style.display  = "none";
    errMsg.style.display  = "none";

    const payload = {
      full_name:     document.getElementById("full_name").value.trim(),
      email:         document.getElementById("email").value.trim(),
      claim_type:    document.getElementById("claim_type").value,
      incident_date: document.getElementById("incident_date").value,
      description:   document.getElementById("description").value.trim(),
      claim_id:      "CLM-" + Date.now(),
      submitted_at:  new Date().toISOString()
    };

    try {
      const res  = await fetch(N8N_WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();

      // Populate results
      document.getElementById("res-id").textContent    = payload.claim_id;
      document.getElementById("res-days").textContent  =
        data.estimated_processing_days ? data.estimated_processing_days + " business days" : "—";
      document.getElementById("res-next").textContent    = data.next_steps    || "—";
      document.getElementById("res-summary").textContent = data.summary       || "—";

      const p = (data.priority || "medium").toLowerCase();
      document.getElementById("res-priority").innerHTML =
        `<span class="badge badge-${p}">${p.toUpperCase()}</span>`;

      const docsList = document.getElementById("res-docs");
      docsList.innerHTML = "";
      (data.required_documents || []).forEach(d => {
        const li = document.createElement("li");
        li.textContent = d;
        docsList.appendChild(li);
      });

      result.style.display = "block";
      result.scrollIntoView({ behavior: "smooth" });

    } catch (err) {
      errMsg.textContent     = "⚠️ " + err.message;
      errMsg.style.display   = "block";
    } finally {
      btn.disabled           = false;
      loading.style.display  = "none";
    }
  });
</script>
</body>
</html>
